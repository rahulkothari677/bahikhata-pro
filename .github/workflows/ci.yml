name: CI — Lint, Type Check, Build, Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx next lint
        continue-on-error: true # Lint warnings are non-blocking (style only)

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        # BLOCKING — type errors indicate real bugs and must not reach production.
        # Previously had continue-on-error: true, removed per Phase 1 audit.

      - name: Run Jest tests
        run: npx jest
        # BLOCKING — unit tests must pass before merge.

      - name: Build Next.js project
        run: npx next build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

  e2e-tests:
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          # Use a dummy DATABASE_URL for E2E — tests use mock data
          DATABASE_URL: 'file:./e2e-test.db'
          NEXTAUTH_SECRET: 'e2e-test-secret'
          NEXTAUTH_URL: 'http://localhost:3000'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
