name: CI — Lint, Type Check, Build, Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx next lint
        continue-on-error: true # Lint warnings shouldn't block the build

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true # We have ignoreBuildErrors: true in next.config, so let's not block CI yet

      - name: Run Jest tests
        run: npx jest
        continue-on-error: true # Tests are nice-to-have, not blocking yet

      - name: Build Next.js project
        run: npx next build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
