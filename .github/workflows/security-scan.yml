# BahiKhata Pro — Weekly Security Scan
# Runs every Sunday at 09:00 UTC (2:30 PM IST)
# Also runs on every push to main and on manual trigger
#
# NOTE: This file needs to be added manually because the PAT used by the AI
# mentor doesn't have 'workflow' scope (which is required to push files
# under .github/workflows/). To add it:
#   1. Copy this file to .github/workflows/security-scan.yml in your repo
#   2. Commit and push from your local machine
#   3. The workflow will start running automatically

name: Weekly Security Scan

on:
  schedule:
    - cron: '0 9 * * 0'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'bun.lock'
  workflow_dispatch:

jobs:
  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run npm audit
        run: |
          echo "## npm audit results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bun pm audit || npm audit || true
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Check for outdated critical packages
        run: |
          echo "## Critical Package Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Current | Latest | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          for pkg in next prisma @prisma/client next-auth bcryptjs; do
            CURRENT=$(grep -oE "\"$pkg\": \"[^\"]+\"" package.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "n/a")
            LATEST=$(npm view "$pkg" version 2>/dev/null || echo "n/a")
            if [ "$CURRENT" = "$LATEST" ]; then
              echo "| $pkg | $CURRENT | $LATEST | up to date |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $pkg | $CURRENT | $LATEST | update available |" >> $GITHUB_STEP_SUMMARY
            fi
          done
      - name: Scan for accidentally committed secrets
        run: |
          echo "## Secret Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SECRETS_FOUND=0
          PATTERNS=(
            'sk_live_[0-9a-zA-Z]{24,}'
            'ghp_[0-9a-zA-Z]{36,}'
            'github_pat_[0-9a-zA-Z_]{40,}'
            'AKIA[0-9A-Z]{16}'
            'xoxb-[0-9a-zA-Z-]{20,}'
            'AIza[0-9a-zA-Z_-]{35}'
          )
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git grep -E "$pattern" -- ':!node_modules' ':!.env.example' ':!.github/**' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "Secret pattern matched: $pattern" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$MATCHES" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              SECRETS_FOUND=$((SECRETS_FOUND + 1))
            fi
          done
          if [ "$SECRETS_FOUND" -eq 0 ]; then
            echo "No secrets found in tracked files" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Run security scan script
        run: chmod +x scripts/security-scan.sh && ./scripts/security-scan.sh || true
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security scan failed — ${new Date().toISOString().split('T')[0]}`,
              body: 'The weekly security scan detected vulnerabilities or secrets. Review: ' +
                    `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security', 'automated']
            })
